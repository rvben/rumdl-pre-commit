- id: rumdl
  name: rumdl
  description: Lint and auto-fix Markdown files. Exits 1 if unfixable violations remain.
  entry: rumdl check --fix
  language: python
  types: [markdown]
  require_serial: true

- id: rumdl-fmt
  name: rumdl fmt
  description: Format Markdown files in place. Always exits 0; relies on pre-commit file-change detection.
  entry: rumdl fmt
  language: python
  types: [markdown]
  require_serial: true
