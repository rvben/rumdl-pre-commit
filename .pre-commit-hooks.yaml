- id: rumdl
  name: rumdl
  description: Lint Markdown files. Exits 1 if violations are found. Add args [--fix] to auto-fix in place.
  entry: rumdl check
  language: python
  types: [markdown]
  require_serial: true

- id: rumdl-fmt
  name: rumdl fmt
  description: Format Markdown files in place. Always exits 0; relies on pre-commit file-change detection.
  entry: rumdl fmt
  language: python
  types: [markdown]
  require_serial: true
